<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .form-container {
        background: #fff;
        padding: 30px 40px;
        border-radius: 12px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        width: 100%;
        max-width: 450px;
    }

    .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        font-size: 14px;
        margin-bottom: 5px;
        color: #555;
        font-weight: 600;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
        transition: all 0.3s ease;
    }

    input:focus, textarea:focus {
        border-color: #4facfe;
        outline: none;
        box-shadow: 0 0 5px rgba(79,172,254,0.5);
    }

    textarea {
        resize: none;
        height: 80px;
    }

    .submit-btn {
        width: 100%;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        color: white;
        border: none;
        padding: 12px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .submit-btn:hover {
        background: linear-gradient(135deg, #3a8dde, #00c6d7);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    @media(max-width: 500px){
        .form-container {
            padding: 20px;
        }
    }
</style>
</head>

<body>

<div class="form-container">
    <h2>Contact Us</h2>

    <form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DHs00000T81PB" method="POST">

        <!-- Salesforce Required Hidden Fields -->
        <input type="hidden" name="oid" value="00DHs00000T81PB">
        <input type="hidden" name="retURL" value="https://www.google.com">

        <!-- ✅ Hidden Lead Source -->
        <input type="hidden" name="lead_source" value="Website">

        <div class="form-group">
            <label>First Name</label>
            <input name="first_name" type="text">
        </div>

        <div class="form-group">
            <label>Last Name *</label>
            <input name="last_name" type="text" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input name="email" type="email">
        </div>

        <div class="form-group">
            <label>Company *</label>
            <input name="company" type="text" required>
        </div>

        <!-- <div class="form-group">
            <label>City</label>
            <input name="city" type="text">
        </div>

        <div class="form-group">
            <label>State</label>
            <input name="state" type="text">
        </div> 

        <div class="form-group">
            <label>Phone</label>
            <input name="phone" type="tel">
        </div>  -->

        <div class="form-group">
            <label>Mobile</label>
            <input name="mobile" type="tel">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description"></textarea>
        </div>

        <button class="submit-btn" type="submit">Submit</button>

    </form>
</div>

</body>
</html>
